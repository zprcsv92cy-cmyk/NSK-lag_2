<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>NSK Lag</title>
  <link rel="manifest" href="./manifest.webmanifest?v=45">
  <link rel="stylesheet" href="./app.css?v=45">
  <meta name="theme-color" content="#ffffff">
</head>
<body>

  <!-- HEADER -->
  <header class="top">
    <img src="./icon-192.png" alt="NSK" class="logo">
    <div class="titleWrap">
      <h1>NSK Lag</h1>
      <div class="sub">Poolspel • Lag • Byten • PDF</div>
    </div>
    <div id="debugVersion" class="versionPill">v45</div>
  </header>

  <!-- HOME -->
  <main id="viewHome">
    <section class="homeCard">
      <button id="openRosterBtn" class="homeBtn primary" type="button">Truppen team 18</button>
      <button id="newPoolspelBtn" class="homeBtn primary" type="button">Skapa nytt poolspel</button>
      <button id="goalieStatsBtn" class="homeBtn secondary" type="button">Statistik målvakter</button>
    </section>

    <section class="homeCard">
      <h2>Sparade poolspel</h2>
      <div id="poolspelList" class="small">Laddar…</div>
    </section>
  </main>

  <!-- APP (poolspel) -->
  <main id="viewApp" style="display:none">
    <button id="backHomeBtn" class="backBtn" type="button">← Startsida</button>
    <div id="currentPoolspelLabel" class="pill">Poolspel</div>

    <!-- här ligger ditt befintliga poolspel-formulär i din gamla index
         (om du redan har det i din version kan du låta det vara kvar).
         Viktigt: behåll ID:n som app.js förväntar sig. -->
    <div id="appRoot"></div>
  </main>

  <!-- TRUPP -->
  <main id="viewRoster" style="display:none">
    <div class="modalHead">
      <h2>Truppen team 18</h2>
      <button id="backFromRosterBtn" class="btn" type="button">Stäng</button>
    </div>

    <section class="card">
      <h3>Spelare</h3>
      <div class="row">
        <input id="newPlayer" placeholder="Förnamn Efternamn">
        <button id="addPlayerBtn" class="btn primary" type="button">Lägg till</button>
      </div>
      <div id="playerList"></div>
    </section>

    <section class="card">
      <h3>Tränare</h3>
      <div class="row">
        <input id="newCoach" placeholder="Förnamn Efternamn">
        <button id="addCoachBtn" class="btn primary" type="button">Lägg till</button>
      </div>
      <div id="coachList"></div>
    </section>

    <section class="card">
      <h3>Import (backup)</h3>
      <p class="small">Klistra in din backup-json här och tryck Importera.</p>
      <textarea id="importTextarea" rows="8" placeholder='{"players":[...],"coaches":[...],"pools":[...],"kv":{...}}'></textarea>
      <div class="row">
        <button id="importFromTextBtn" class="btn primary" type="button">Importera</button>
        <button id="clearImportBtn" class="btn" type="button">Rensa</button>
      </div>
      <div id="importMsg" class="small"></div>
    </section>
  </main>

  <script src="./app.js?v=45"></script>
</body>
</html>
