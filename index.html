<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NSK Lag</title>

  <link rel="manifest" href="manifest.webmanifest?v=v62">
  <link rel="stylesheet" href="app.css?v=v62">
  <meta name="theme-color" content="#0b5ed7">
</head>

<body>
<div id="app">

  <!-- STARTSIDA -->
  <section id="viewHome">
    <h1>NSK Lag</h1>

    <button id="openRosterBtn" class="primary">Truppen Team 18</button>
    <button id="newPoolspelBtn" class="primary">Skapa nytt poolspel</button>

    <h3>Poolspel</h3>
    <div id="poolList"></div>
  </section>

  <!-- POOLSPEL / MATCH -->
  <section id="viewApp" style="display:none">
    <div class="topbar">
      <button id="backHomeBtn">← Hem</button>
      <div id="version">v62</div>
    </div>

    <h2 id="currentPoolLabel">Poolspel</h2>

    <div class="card">
      <div class="grid2">
        <div>
          <label>Motståndare</label>
          <input id="opponent" placeholder="t.ex. Karlstad IBF" />
        </div>
        <div>
          <label>Starttid</label>
          <input id="startTime" type="time" />
        </div>
      </div>

      <div class="grid2">
        <div>
          <label>Plan</label>
          <select id="arena">
            <option value="1">Plan 1</option>
            <option value="2">Plan 2</option>
            <option value="3">Plan 3</option>
            <option value="4">Plan 4</option>
          </select>
        </div>
        <div>
          <label>Match</label>
          <select id="matchNo"></select>
        </div>
      </div>

      <div class="grid2">
        <div>
          <label>Antal på plan</label>
          <select id="onCourt">
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
          </select>
        </div>
        <div>
          <label>Antal i truppen (ranking)</label>
          <select id="teamSize"></select>
        </div>
      </div>

      <div class="grid2">
        <div>
          <label>Perioder (1–3)</label>
          <select id="periodsCount">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
          </select>
        </div>
        <div>
          <label>Periodtid (min)</label>
          <select id="periodMin"></select>
        </div>
      </div>

      <div class="grid2">
        <div>
          <label>Bytestid (sek)</label>
          <select id="shiftSec"></select>
        </div>
        <div>
          <label>Målvakt</label>
          <select id="goalie"></select>
        </div>
      </div>

      <div class="row">
        <button id="btnGenerate" class="primary">Generera bytesschema</button>
        <button id="btnResetDone">Nollställ “Gjort”</button>
        <button id="btnMatchMode" class="primary">Matchläge</button>
      </div>
    </div>

    <h3>Spelare (ranking)</h3>
    <div id="playersContainer" class="playersGrid"></div>

    <h3>Bytesschema</h3>
    <div id="scheduleOut"></div>
  </section>

  <!-- TRUPP -->
  <section id="viewRoster" style="display:none">
    <div class="topbar">
      <button id="backFromRosterBtn">← Hem</button>
    </div>

    <h2>Truppen Team 18</h2>

    <h3>Spelare</h3>
    <div id="playerList"></div>
    <div class="row">
      <input id="newPlayer" placeholder="Ny spelare">
      <button id="addPlayerBtn" class="primary">Lägg till</button>
    </div>

    <hr>

    <h3>Tränare</h3>
    <div id="coachList"></div>
    <div class="row">
      <input id="newCoach" placeholder="Ny tränare">
      <button id="addCoachBtn" class="primary">Lägg till</button>
    </div>
  </section>

  <!-- MATCH MODE -->
  <section id="viewMatch" style="display:none">
    <div class="matchWrap">
      <div class="matchTop">
        <div class="matchTitle" id="matchTitle">Matchläge</div>
        <button id="exitMatchBtn">Avsluta</button>
      </div>

      <div class="bigPanel">
        <div class="bigLabel">Nästa byte</div>
        <div class="bigTime" id="mm_time">—</div>
        <div class="bigLineup" id="mm_lineup">—</div>

        <div class="smallMeta" id="mm_meta">—</div>

        <button id="mm_markNext" class="primary bigBtn">MARKERA & NÄSTA</button>
        <button id="mm_showInList" class="ghostBtn">Visa i listan</button>
      </div>
    </div>
  </section>

</div>

<script src="app.js?v=v62"></script>
</body>
</html>
