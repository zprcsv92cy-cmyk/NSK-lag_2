<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NSK Lag</title>

<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="app.css">

<meta name="theme-color" content="#0b5ed7">

</head>
<body>

<div id="app">

<!-- STARTSIDA -->
<section id="viewHome">

<h1>NSK Lag</h1>

<button id="openRosterBtn" class="primary">
Truppen Team 18
</button>

<button id="newPoolspelBtn" class="primary">
Skapa nytt poolspel
</button>

<div id="poolList"></div>

</section>


<!-- MATCH APP -->
<section id="viewApp" style="display:none">

<div class="topbar">

<button id="backHomeBtn">← Hem</button>

<div id="version">v60</div>

</div>

<h2 id="currentPoolLabel">Poolspel</h2>

<button id="startMatchBtn" class="primary big">
START MATCH
</button>

</section>


<!-- TRUPP -->
<section id="viewRoster" style="display:none">

<div class="topbar">
<button id="backFromRosterBtn">← Hem</button>
</div>

<h2>Truppen Team 18</h2>

<div id="playerList"></div>

<input id="newPlayer" placeholder="Ny spelare">
<button id="addPlayerBtn">Lägg till</button>

<hr>

<div id="coachList"></div>

<input id="newCoach" placeholder="Ny tränare">
<button id="addCoachBtn">Lägg till</button>

</section>


<!-- MATCH MODE -->
<section id="viewMatch" style="display:none">

<div id="matchMode">

<div id="matchClock">00:00</div>

<button id="exitMatchBtn">
Avsluta match
</button>

</div>

</section>

</div>

<script src="app.js"></script>

</body>
</html>
