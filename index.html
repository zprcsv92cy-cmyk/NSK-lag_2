<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>NSK Lag</title>

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="app.css">

  <meta name="theme-color" content="#0b1220" />
</head>

<body>

<div class="app-bg"></div>

<header class="top">
  <div class="logo-row">
    <img src="icon-192.png" class="logo-small">
    <div>
      <h1>NSK Lag</h1>
      <div class="sub">Poolspel • Lag • Byten • PDF</div>
    </div>
    <div class="version">v70</div>
  </div>
</header>

<nav class="tabs">
  <button onclick="showTab('home')">Startsida</button>
  <button onclick="showTab('team')">Truppen</button>
  <button onclick="showTab('pools')">Poolspel</button>
  <button onclick="showTab('goalieStats')">Statistik målvakter</button>
</nav>

<main>

<section id="home" class="tab active">
  <h2>Sparade poolspel</h2>
  <div id="poolList"></div>
</section>

<section id="team" class="tab">
  <h2>Spelare</h2>

  <div class="add-row">
    <input id="playerName" placeholder="Förnamn Efternamn">
    <button onclick="addPlayer()">Lägg till</button>
  </div>

  <ul id="playerList"></ul>

  <h2>Tränare</h2>

  <div class="add-row">
    <input id="coachName" placeholder="Namn tränare">
    <button onclick="addCoach()">Lägg till</button>
  </div>

  <div id="coachList" class="chips"></div>
</section>

<section id="pools" class="tab">

  <h2>Skapa nytt poolspel</h2>

  <div class="form">
    <input id="poolDate" type="date">
    <input id="poolPlace" placeholder="Plats">
    <button onclick="createPool()">Skapa</button>
  </div>

</section>

<section id="goalieStats" class="tab">
  <h2>Målvaktsstatistik</h2>
  <div id="goalieStatsList"></div>
</section>

</main>

<script src="app.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
