<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NSK Lag</title>

  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./app.css?v=39">

  <!-- NUCLEAR RESET -->
  <script>
  (async () => {
    const params = new URLSearchParams(location.search);
    if (params.get('reset') !== '1') return;

    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
    }

    if (window.caches) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
    }

    const url = new URL(location.href);
    url.searchParams.delete('reset');
    location.replace(url.toString());
  })();
  </script>

  <script defer src="./app.js?v=39"></script>
</head>

<body>

<header class="header">
  <img src="icon-192.png" class="logo">
  <div>
    <h1>NSK Lag</h1>
    <div class="subtitle">Poolspel • Lag • Byten • PDF</div>
  </div>
  <div id="versionBox" class="version">v39</div>
</header>

<!-- STARTSIDA -->
<section id="view-home" class="view active">
  <button class="big-btn" onclick="go('trupp')">Truppen team 18</button>
  <button class="big-btn" onclick="go('poolspel')">Skapa nytt poolspel</button>
  <button class="big-btn disabled">Statistik målvakter</button>
</section>

<!-- TRUPP -->
<section id="view-trupp" class="view">
  <button class="back-btn" onclick="go('home')">← Startsida</button>

  <h2>Truppen team 18</h2>

  <div class="card">
    <h3>Spelare</h3>
    <div id="playerList"></div>
    <button onclick="addPlayer()">+ Lägg till spelare</button>
  </div>

  <div class="card" style="margin-top:12px;">
    <h3>Tränare</h3>
    <div id="coachList"></div>
    <button onclick="addCoach()">+ Lägg till tränare</button>
  </div>

  <div class="card" style="margin-top:12px;">
    <h3>Import (backup)</h3>
    <div class="small">
      Välj din <b>nsk-lag-backup.json</b> så importeras spelare + tränare.
    </div>
    <input id="importFile" type="file" accept="application/json">
    <div id="importMsg" class="small" style="margin-top:8px;"></div>
  </div>
</section>

<!-- POOLSPEL -->
<section id="view-poolspel" class="view">
  <button class="back-btn" onclick="go('home')">← Startsida</button>
  <h2>Poolspel</h2>
  <div>Här kommer poolspelet...</div>
</section>

</body>
</html>
