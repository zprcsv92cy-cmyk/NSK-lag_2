<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>NSK Lag</title>

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon-192.png" />
  <link rel="apple-touch-icon" href="./icon-192.png" />

  <link rel="stylesheet" href="./app.css?v=60" />
  <script defer src="./app.js?v=60"></script>
</head>

<body>
  <header class="top">
    <div class="brand">
      <img class="logo" src="./icon-192.png" alt="NSK" />
      <div>
        <div class="title">NSK Lag</div>
        <div class="subtitle">Poolspel • Lag • Byten • PDF</div>
      </div>
    </div>

    <div class="versionPill" id="versionPill">v60</div>
  </header>

  <nav class="tabs" aria-label="Navigation">
    <a class="tab" href="#startsida" data-nav="#startsida">Startsida</a>
    <a class="tab" href="#trupp" data-nav="#trupp">Truppen team 18</a>
    <a class="tab" href="#poolspel" data-nav="#poolspel">Poolspel</a>
  </nav>

  <main class="wrap">
    <!-- STARTSIDA -->
    <section id="view-startsida" class="view">
      <div class="card">
        <button class="btnPrimary big" data-action="open-trupp">Truppen team 18</button>
        <button class="btnPrimary big" data-action="new-pool">Skapa nytt poolspel</button>
        <button class="btnSecondary big" data-action="stats">Statistik målvakter</button>
      </div>

      <div class="card">
        <h2>Sparade poolspel</h2>
        <div id="poolList" class="poolList"></div>
      </div>
    </section>

    <!-- POOLSPEL -->
    <section id="view-poolspel" class="view hidden">
      <div class="card">
        <div class="rowBetween">
          <h2>Poolspel</h2>
          <button class="btnSecondary" data-action="new-pool">Skapa nytt</button>
        </div>

        <div id="poolList2" class="poolList"></div>
      </div>
    </section>
  </main>

  <!-- TRUPP OVERLAY (popup) -->
  <div class="overlay hidden" id="truppOverlay" role="dialog" aria-modal="true" aria-label="Truppen team 18">
    <div class="sheet">
      <div class="sheetHeader">
        <div class="sheetTitle">Truppen team 18</div>
        <button class="btnSecondary" data-action="close-trupp">Stäng</button>
      </div>

      <div class="sheetBody">
        <div class="card inner">
          <h3>Spelare</h3>
          <input id="newPlayer" class="input" placeholder="Förnamn Efternamn" autocomplete="off" />
          <button class="btnPrimary" data-action="add-player">Lägg till</button>

          <div id="playerList" class="list"></div>
        </div>

        <div class="card inner">
          <h3>Tränare</h3>
          <input id="newCoach" class="input" placeholder="Förnamn Efternamn" autocomplete="off" />
          <button class="btnPrimary" data-action="add-coach">Lägg till</button>

          <div id="coachList" class="list"></div>
        </div>

        <div class="card inner">
          <h3>Import (backup)</h3>
          <p class="muted">
            Klistra in hela din backup-JSON här och tryck Importera.
          </p>
          <textarea id="importArea" class="textarea" placeholder='{"players":[...],"coaches":[...],"pools":[...],"kv":{...}}'></textarea>
          <div class="row">
            <button class="btnPrimary" data-action="import-json">Importera</button>
            <button class="btnSecondary" data-action="export-json">Exportera</button>
          </div>
          <div id="importMsg" class="msg"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Update banner (auto-update) -->
  <div class="updateBanner hidden" id="updateBanner">
    <div>Ny version tillgänglig — uppdatera sidan</div>
    <button class="btnPrimary" id="updateBtn" type="button">Uppdatera nu</button>
    <button class="btnSecondary" id="dismissBtn" type="button">Sen</button>
  </div>
</body>
</html>
