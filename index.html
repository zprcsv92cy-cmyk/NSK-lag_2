<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NSK Lag</title>

  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./app.css?v=41">

  <!-- NUCLEAR RESET: https://.../?reset=1 -->
  <script>
  (async () => {
    const params = new URLSearchParams(location.search);
    if (params.get('reset') !== '1') return;

    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
    }

    if (window.caches) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
    }

    const url = new URL(location.href);
    url.searchParams.delete('reset');
    location.replace(url.toString());
  })();
  </script>

  <script defer src="./app.js?v=41"></script>
</head>

<body>
  <header class="header">
    <img src="icon-192.png" class="logo" alt="NSK">
    <div class="headText">
      <h1>NSK Lag</h1>
      <div class="subtitle">Poolspel • Lag • Byten • PDF</div>
    </div>
    <div id="versionBox" class="versionPill">v41</div>
  </header>

  <!-- STARTSIDA -->
  <main class="page">
    <section class="homeCard">
      <button class="homeBtn primary" id="openRosterBtn" type="button">Truppen team 18</button>
      <button class="homeBtn primary" id="newPoolspelBtn" type="button">Skapa nytt poolspel</button>
      <button class="homeBtn secondary" id="goalieStatsBtn" type="button">Statistik målvakter</button>
    </section>

    <section class="savedCard">
      <h2>Sparade poolspel</h2>
      <div id="poolspelList" class="small">Inga sparade poolspel ännu.</div>
    </section>
  </main>

  <!-- TRUPP MODAL -->
  <div id="rosterModal" class="modal" aria-hidden="true">
    <div class="modalSheet" role="dialog" aria-modal="true" aria-labelledby="rosterTitle">
      <div class="modalHeader">
        <div id="rosterTitle" class="modalTitle">Truppen team 18</div>
        <button class="closeBtn" id="closeRosterBtn" type="button">Stäng</button>
      </div>

      <div class="modalBody">
        <div class="sectionCard">
          <h3>Spelare</h3>
          <div class="stack">
            <input id="newPlayer" class="textInput" placeholder="Förnamn Efternamn" autocomplete="off" />
            <button class="homeBtn primary" id="addPlayerBtn" type="button">Lägg till</button>
          </div>
          <div id="playerList" class="list"></div>
        </div>

        <div class="sectionCard" style="margin-top:14px;">
          <h3>Tränare</h3>
          <div class="stack">
            <input id="newCoach" class="textInput" placeholder="Förnamn Efternamn" autocomplete="off" />
            <button class="homeBtn primary" id="addCoachBtn" type="button">Lägg till</button>
          </div>
          <div id="coachList" class="list"></div>
        </div>

        <div class="sectionCard" style="margin-top:14px;">
          <h3>Import (backup)</h3>
          <div class="small">
            Öppna din <b>nsk-lag-backup.json</b>, kopiera hela innehållet och klistra in nedan.
          </div>
          <textarea id="importText" class="textArea" rows="6" placeholder='{"players":[...],"coaches":[...]}'></textarea>
          <div class="rowBtns">
            <button class="ghostBtn" id="importBtn" type="button">Importera</button>
            <button class="ghostBtn" id="clearImportBtn" type="button">Rensa</button>
          </div>
          <div id="importMsg" class="small"></div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
